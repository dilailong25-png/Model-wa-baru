<head>

<body class="bg-darkBg text-white h-screen flex overflow-hidden font-sans select-none no-select" onclick="closeMenus()">

    <div class="hidden md:flex w-16 bg-sidebarBg flex-col justify-between items-center py-4 border-r border-gray-800 shrink-0">
        <div class="flex flex-col space-y-6 items-center w-full">
            <div onclick="toggleView('chat')" class="text-activeGreen bg-[#202c33] p-3 rounded-xl cursor-pointer"><i class="fa-regular fa-comment-dots text-xl"></i></div>
            <div onclick="toggleView('settings')" class="text-textMuted hover:text-white p-3 cursor-pointer"><i class="fa-solid fa-gear text-xl"></i></div>

    <div id="sidebar-panel" class="w-full md:w-80 bg-sidebarBg flex flex-col border-r border-gray-800 shrink-0 h-full">
        <div id="sidebar-chat-view" class="flex flex-col h-full justify-between">
            <div class="flex flex-col flex-1 min-h-0">
                <div class="p-4 space-y-4">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center space-x-3">

                        </div>

                    </div>
                    <input type="text" placeholder="Search" class="w-full bg-[#202c33] text-sm p-2 rounded-lg outline-none">

            <div class="p-2 border-t border-gray-800 bg-sidebarBg z-10">
                <button id="btn-toggle-archive" onclick="toggleArchiveView()" class="w-full flex items-center justify-between p-3 rounded-lg bg-[#202c33] text-sm hover:bg-gray-800 transition">
                    <span class="flex items-center gap-2"><i class="fa-solid fa-box-archive text-activeGreen"></i> <span id="archive-btn-text">Lihat Arsip</span></span>

        <div id="sidebar-settings-view" class="hidden flex flex-col h-full p-4 space-y-2">

                <button onclick="toggleView('chat')" class="md:hidden text-textMuted hover:text-white"><i class="fa-solid fa-arrow-left"></i></button>

            </div>
            <button onclick="switchSettingsTab('general')" class="w-full text-left p-3 rounded bg-[#202c33] text-sm font-medium hover:bg-gray-800">📁 General Settings</button>
            <button onclick="switchSettingsTab('users')" class="w-full text-left p-3 rounded bg-[#202c33] text-sm font-medium hover:bg-gray-800">👥 Users Management</button>

    <div id="main-content-panel" class="hidden md:flex flex-1 bg-chatBg flex-col justify-between relative h-full w-full">
        <div id="main-chat-panel" class="flex flex-col h-full justify-between w-full">
            
            <div class="h-16 bg-[#202c33] flex items-center justify-between px-4 md:px-6 border-b border-gray-800 z-20 shrink-0">
                <div id="normal-header" class="flex items-center space-x-3 min-w-0">
                    <button onclick="backToSidebar()" class="md:hidden text-textMuted hover:text-white text-lg pr-1"><i class="fa-solid fa-arrow-left"></i></button>
                    <div id="active-avatar" class="w-10 h-10 bg-sky-600 rounded-full flex items-center justify-center font-bold shrink-0">T</div>
                    <h3 id="active-name" class="text-sm font-medium truncate">TFAM ID</h3>
                </div>
                
                <div id="wa-toolbar" class="hidden flex items-center space-x-2 bg-[#005c4b] px-3 py-1.5 rounded-lg text-xs max-w-full overflow-x-auto">
                    <span id="sel-count" class="whitespace-nowrap font-bold">0 Sel</span>

                    <button onclick="deleteMsg()" class="text-red-300 hover:text-red-200 px-1 py-0.5"><i class="fa-solid fa-trash"></i> Delete</button>
                    <button onclick="clearSelection()" class="text-gray-300 pl-1">Cancel</button>

            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-3 bg-opacity-95"></div>

            <div id="attach-menu" class="hidden absolute bottom-24 left-4 bg-[#222e35] rounded-xl border border-gray-700 py-1 w-44 z-40 shadow-xl">
                <label class="flex items-center space-x-3 px-4 py-3 hover:bg-[#2a3942] cursor-pointer text-sm"><i class="fa-regular fa-image text-emerald-400"></i><span>Image / Photo</span><input type="file" accept="image/*" class="hidden" onchange="handleFileUpload(this, 'image')"></label>
                <label class="flex items-center space-x-3 px-4 py-3 hover:bg-[#2a3942] cursor-pointer text-sm"><i class="fa-regular fa-file-video text-red-400"></i><span>Video</span><input type="file" accept="video/*" class="hidden" onchange="handleFileUpload(this, 'video')"></label>
                <label class="flex items-center space-x-3 px-4 py-3 hover:bg-[#2a3942] cursor-pointer text-sm"><i class="fa-regular fa-file-lines text-blue-400"></i><span>Document</span><input type="file" accept=".pdf,.doc,.docx,.xls,.xlsx,.txt" class="hidden" onchange="handleFileUpload(this, 'document')"></label>

            <div id="input-container" class="transition-all duration-200 bg-[#202c33] flex items-end px-4 py-3 space-x-3 border-t border-gray-800 relative z-30 shrink-0 h-16">
                <button onclick="event.stopPropagation(); document.getElementById('attach-menu').classList.toggle('hidden')" class="text-textMuted hover:text-white text-xl mb-1"><i class="fa-solid fa-paperclip"></i></button>
                
                <div class="flex-1 flex bg-[#2a3942] rounded-lg items-end px-2 relative">
                    <textarea id="msg-input" placeholder="Type or paste long broadcast messages here..." class="w-full bg-transparent py-2 pl-2 pr-8 outline-none text-sm resize-none h-9 max-h-48 overflow-y-auto" onkeydown="handleKeyPress(event)"></textarea>
                    <button onclick="toggleExpandInput()" id="expand-btn" class="absolute right-2 bottom-2 text-textMuted hover:text-white text-xs p-1" title="Perluas Kolom Input">
                        <i class="fa-solid fa-expand"></i>
                    </button>

                <button onclick="sendText()" class="text-activeGreen text-xl p-1 shrink-0 mb-0.5"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>

        <div id="main-settings-panel" class="hidden flex-1 p-4 md:p-8 overflow-y-auto bg-sidebarBg w-full h-full">
            <div id="tab-general" class="space-y-4">
                <h2 class="text-xl font-bold">General Settings</h2>
                <div class="bg-settingsBg p-4 rounded-lg max-w-md border border-gray-700">
                    <label class="text-xs text-textMuted block mb-1">Gateway Name</label>
                    <input type="text" value="WhatsApp Local Gateway" class="w-full bg-[#2a3942] p-2 rounded outline-none text-sm mb-3">
                    <button onclick="alert('Settings Saved')" class="bg-activeGreen px-4 py-2 rounded text-sm w-full sm:w-auto">Save Changes</button>
                </div>
            </div>
            <div id="tab-users" class="hidden space-y-4"><h2 class="text-xl font-bold">Users Management</h2><p class="text-sm text-textMuted">Admin Profile active.</p></div>
            <div id="tab-api" class="hidden space-y-4">
                <h2 class="text-xl font-bold">API Integrations</h2>
                <div class="bg-settingsBg p-4 rounded-lg max-w-md border border-gray-700">
                    <label class="text-xs text-textMuted block mb-1">Your API Key</label>
                    <input type="text" value="wg_live_98234jksdf9234kmcsdf" readonly class="w-full bg-black/40 text-emerald-400 p-2 rounded text-xs font-mono overflow-x-auto">
                </div>
            </div>
        </div>
    </div>

    <div id="contact-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50">
        <div class="bg-settingsBg p-6 rounded-xl w-full max-w-sm border border-gray-700">
            <h3 class="text-lg font-semibold mb-4">Add New Contact</h3>
            <input type="text" id="new-name" placeholder="Contact Name" class="w-full bg-[#2a3942] p-2.5 rounded mb-4 outline-none text-sm">
            <div class="flex justify-end space-x-2"><button onclick="closeModal('contact-modal')" class="text-textMuted text-sm px-3 py-2">Cancel</button><button onclick="saveContact()" class="bg-activeGreen px-4 py-2 rounded text-sm">Save</button></div>

    <div id="forward-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50">
        <div class="bg-settingsBg p-6 rounded-xl w-full max-w-sm border border-gray-700">
            <h3 class="text-lg font-semibold mb-4">Forward Message To:</h3>
            <div id="forward-list" class="space-y-2 max-h-60 overflow-y-auto mb-4"></div>
            <div class="flex justify-end"><button onclick="closeModal('forward-modal')" class="text-sm text-textMuted px-3 py-2">Cancel</button></div>
        </div>

    <div id="pdf-export-container" class="hidden text-black p-8 bg-white" style="font-family: Arial, sans-serif;"></div>

    <script>


        // 1. Ganti fungsi handleKeyPress agar saat meluas, kirim pesan bisa menggunakan Ctrl + Enter
function handleKeyPress(e) {
    if (e.key === 'Enter') {
        if (!isInputExpanded && !e.shiftKey) {
            // Jika kolom kecil: Enter langsung kirim
            e.preventDefault(); 
            sendText();
        } else if (isInputExpanded && (e.ctrlKey || e.metaKey)) {
            // Jika kolom besar: Ctrl + Enter untuk kirim (Enter biasa untuk baris baru)
            e.preventDefault();
            sendText();
        }
    }
}

// 2. Ganti fungsi sendText agar membersihkan text area dengan benar saat kondisi meluas
function sendText() {
    const inp = document.getElementById('msg-input'); 
    if (!inp.value.trim()) return;
    
    const act = contacts.find(c => c.id === activeId); 
    if (!act) return;
    
    const now = new Date();
    
    act.messages.push({ 
        id: Date.now(), 
        type: 'out', 
        msgType: 'text', 
        text: inp.value, 
        time: now.getHours().toString().padStart(2, '0') + '.' + now.getMinutes().toString().padStart(2, '0') 
    });
    
    // Reset nilai teks input
    inp.value = '';
    
    // Kembalikan tinggi textarea sesuai dengan kondisi layarnya
    if (!isInputExpanded) {
        inp.style.height = '36px';
    } else {
        inp.style.height = '150px'; // Tetap tinggi jika mode meluas aktif
    }
    
    renderMessages(); 
    renderContacts(); 
    save();
}

        let contacts = JSON.parse(localStorage.getItem('wg_chats')) || [
            { id: 'tfam', name: 'TFAM ID', color: 'bg-sky-600', isArchived: false, messages: [
                { id: 1, type: 'in', msgType: 'text', text: '🚀 Upgrade Branding Usaha Sekarang!\n\nDesain profesional bikin bisnis makin dipercaya ✨', time: '09.00' }
            ]}
        ];
        let activeId = localStorage.getItem('wg_active') || 'tfam';
        let selectedIds = [];
        let viewArchivedMode = false;
        let isInputExpanded = false; // Status ukuran kolom input

        function save() {
            localStorage.setItem('wg_chats', JSON.stringify(contacts));
            localStorage.setItem('wg_active', activeId);
        }

        function backToSidebar() {
            document.getElementById('sidebar-panel').classList.remove('hidden');
            document.getElementById('main-content-panel').classList.add('hidden');
        }

        function switchChat(id) {
            activeId = id; clearSelection(); renderContacts(); renderMessages(); save();
            if (window.innerWidth < 768) {
                document.getElementById('sidebar-panel').classList.add('hidden');
                document.getElementById('main-content-panel').classList.remove('hidden');
                document.getElementById('main-content-panel').classList.add('flex');
            }
        }

        function toggleView(view) {
            if (view === 'chat') {
                document.getElementById('sidebar-chat-view').classList.remove('hidden');
                document.getElementById('main-chat-panel').classList.remove('hidden');
                document.getElementById('sidebar-settings-view').classList.add('hidden');
                document.getElementById('main-settings-panel').classList.add('hidden');
            } else {
                document.getElementById('sidebar-chat-view').classList.add('hidden');
                document.getElementById('main-chat-panel').classList.add('hidden');
                document.getElementById('sidebar-settings-view').classList.remove('hidden');
                document.getElementById('main-settings-panel').classList.remove('hidden');
                if (window.innerWidth < 768) {
                    document.getElementById('sidebar-panel').classList.add('hidden');
                    document.getElementById('main-content-panel').classList.remove('hidden');
                    document.getElementById('main-content-panel').classList.add('flex');
                }
            }
        }

        function switchSettingsTab(tab) {
            ['general', 'users', 'api'].forEach(t => document.getElementById(`tab-${t}`).classList.add('hidden'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
        }

        function toggleArchiveView() {
            viewArchivedMode = !viewArchivedMode;
            document.getElementById('sidebar-title').innerText = viewArchivedMode ? "Archived Chats" : "Chats";
            document.getElementById('archive-btn-text').innerText = viewArchivedMode ? "Lihat Chat Utama" : "Lihat Arsip";
            const filtered = contacts.filter(c => c.isArchived === viewArchivedMode);
            if (filtered.length > 0) {
                if (window.innerWidth >= 768) switchChat(filtered[0].id);
                else { renderContacts(); renderMessages(); }
            } else { activeId = null; renderContacts(); renderMessages(); }
        }

        // FITUR BARU: Melebarkan area ketik agar muat iklan/pesan broadcast panjang
        function toggleExpandInput() {
            const container = document.getElementById('input-container');
            const textarea = document.getElementById('msg-input');
            const icon = document.querySelector('#expand-btn i');
            isInputExpanded = !isInputExpanded;

            if(isInputExpanded) {
                container.style.height = "180px";
                textarea.style.height = "150px";
                icon.className = "fa-solid fa-compress";
                document.getElementById('expand-btn').title = "Kecilkan Kolom Input";
            } else {
                container.style.height = "64px";
                textarea.style.height = "36px";
                icon.className = "fa-solid fa-expand";
                document.getElementById('expand-btn').title = "Perluas Kolom Input";
            }
        }

        function renderContacts() {
            const list = document.getElementById('chat-list'); list.innerHTML = '';
            const showContacts = contacts.filter(c => c.isArchived === viewArchivedMode);
            const archiveCount = contacts.filter(c => c.isArchived).length;
            document.getElementById('archive-count').innerText = archiveCount;

            showContacts.forEach(c => {
                const last = c.messages[c.messages.length - 1] || { text: 'Belum ada pesan' };
                const isAct = c.id === activeId ? 'bg-[#202c33]' : '';
                let previewText = last.text.split('\n')[0]; 

                list.insertAdjacentHTML('beforeend', `
                    <div onclick="switchChat('${c.id}')" class="group flex items-center justify-between p-3 rounded-lg cursor-pointer ${isAct} hover:bg-[#202c33]/50 relative transition">
                        <div class="flex items-center space-x-3 min-w-0 flex-1">
                            <div class="w-10 h-10 ${c.color} rounded-full flex items-center justify-center font-bold shrink-0">${c.name[0]}</div>
                            <div class="flex-1 min-w-0">
                                <h2 class="text-sm truncate pr-12 md:pr-16">${c.name}</h2>
                                <p class="text-xs text-textMuted truncate pr-12 md:pr-16">${previewText}</p>
                            </div>
                        </div>
                        <div class="absolute right-2 top-1/2 -translate-y-1/2 flex md:hidden group-hover:flex items-center space-x-2 bg-gradient-to-l from-[#131a1e] via-[#131a1e] to-transparent pl-4 h-full z-10">
                            <button onclick="event.stopPropagation(); toggleArchiveContact('${c.id}')" class="text-textMuted hover:text-activeGreen p-1"><i class="fa-solid fa-box-archive"></i></button>
                            <button onclick="event.stopPropagation(); deleteContact('${c.id}')" class="text-textMuted hover:text-red-400 p-1"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>
                `);
            });
        }

        function toggleArchiveContact(id) {
            const contact = contacts.find(c => c.id === id);
            if (contact) {
                contact.isArchived = !contact.isArchived;
                const remaining = contacts.filter(c => c.isArchived === viewArchivedMode);
                if (activeId === id) activeId = remaining.length > 0 ? remaining[0].id : null;
                save(); renderContacts(); renderMessages();
            }
        }

        function deleteContact(id) {
            if (confirm("Hapus kontak permanen?")) {
                contacts = contacts.filter(c => c.id !== id);
                if (activeId === id) {
                    const remaining = contacts.filter(c => c.isArchived === viewArchivedMode);
                    activeId = remaining.length > 0 ? remaining[0].id : null;
                }
                save(); renderContacts(); renderMessages();
            }
        }

        function renderMessages() {
            const box = document.getElementById('chat-messages'); box.innerHTML = '';
            const act = contacts.find(c => c.id === activeId); 
            if (!act) { box.innerHTML = '<div class="h-full flex items-center justify-center text-textMuted text-sm">Silakan pilih obrolan</div>'; return; }

            document.getElementById('active-name').innerText = act.name;
            document.getElementById('active-avatar').innerText = act.name[0];

            act.messages.forEach(m => {
                const isOut = m.type === 'out';
                const isSel = selectedIds.includes(m.id);
                const bg = isOut ? 'bg-bubbleOut' : 'bg-bubbleIn';
                const side = isOut ? 'justify-end' : 'justify-start';
                const border = isSel ? 'border-2 border-emerald-400 scale-[0.98]' : '';

                let contentHTML = `<p class="text-sm font-light pr-6 whitespace-pre-wrap break-words leading-relaxed">${m.text}</p>`;
                
                // FITUR DATA DOWNLOAD: Menambahkan tombol download di setiap data media
                if (m.msgType === 'image') {
                    contentHTML = `
                        <div class="relative group/media">
                            <img src="${m.src}" class="max-w-[240px] sm:max-w-xs rounded mb-1 max-h-48 object-cover">
                            <button onclick="event.stopPropagation(); downloadMediaFile('${m.src}', 'photo.jpg')" class="absolute top-2 right-2 bg-black/60 hover:bg-black text-white w-8 h-8 rounded-full flex items-center justify-center opacity-0 group-hover/media:opacity-100 transition shadow"><i class="fa-solid fa-download"></i></button>
                        </div>`;
                }
                if (m.msgType === 'video') {
                    contentHTML = `
                        <div class="relative group/media">
                            <video src="${m.src}" controls class="max-w-[240px] sm:max-w-xs rounded mb-1 max-h-48"></video>
                            <button onclick="event.stopPropagation(); downloadMediaFile('${m.src}', 'video.mp4')" class="absolute top-2 right-2 bg-black/60 hover:bg-black text-white w-8 h-8 rounded-full flex items-center justify-center opacity-0 group-hover/media:opacity-100 transition shadow"><i class="fa-solid fa-download"></i></button>
                        </div>`;
                }
                if (m.msgType === 'document') {
                    contentHTML = `
                        <div class="flex items-center justify-between p-2 bg-black/20 rounded text-sm max-w-xs gap-4">
                            <div class="flex items-center space-x-2 min-w-0">
                                <i class="fa-regular fa-file-pdf text-xl text-red-400 shrink-0"></i>
                                <span class="truncate max-w-[140px] sm:max-w-[160px]">${m.text}</span>
                            </div>
                            <button onclick="event.stopPropagation(); alert('Mengunduh dokumen mock: ' + '${m.text}')" class="text-textMuted hover:text-white p-1"><i class="fa-solid fa-download"></i></button>
                        </div>`;
                }

                box.insertAdjacentHTML('beforeend', `
                    <div oncontextmenu="event.preventDefault(); toggleSelect(${m.id})" onclick="if(selectedIds.length>0) toggleSelect(${m.id})" class="flex ${side} cursor-pointer transition-all duration-100">
                        <div class="${bg} ${border} max-w-[85%] md:max-w-xl rounded-lg p-3 shadow relative">
                            ${isSel ? '<span class="text-[9px] text-emerald-400 block font-bold mb-0.5"><i class="fa-solid fa-circle-check"></i> Selected</span>' : ''}
                            ${contentHTML}
                            <span class="text-[9px] text-textMuted absolute bottom-1 right-2">${m.time}</span>
                        </div>
                    </div>
                `);
            });
            box.scrollTop = box.scrollHeight;
        }

        // FITUR BARU: Download Pesan Teks Terpilih (Eksport PDF & TXT)
        function downloadSelected(format) {
            const act = contacts.find(c => c.id === activeId);
            const selectedMsgs = act.messages.filter(m => selectedIds.includes(m.id));
            
            if(selectedMsgs.length === 0) return alert("Pilih pesan teks terlebih dahulu!");

            // Gabungkan teks terpilh
            let combinedText = `RIWAYAT PESAN DARI CHAT: ${act.name}\n`;
            combinedText += `Diekspor pada: ${new Date().toLocaleString()}\n`;
            combinedText += `==========================================\n\n`;
            
            selectedMsgs.forEach(m => {
                const sender = m.type === 'out' ? 'Anda' : act.name;
                combinedText += `[${m.time}] ${sender}:\n${m.text}\n\n--------------------\n`;
            });

            if(format === 'txt') {
                // Proses unduh file .txt biasa
                const blob = new Blob([combinedText], { type: 'text/plain' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `Chat_Export_${act.name}.txt`;
                link.click();
            } else if (format === 'pdf') {
                // Proses unduh file .pdf menggunakan html2pdf.js secara instan
                const exportArea = document.getElementById('pdf-export-container');
                exportArea.innerHTML = `
                    <h2 style="color: #005c4b; margin-bottom: 5px;">WhatsApp Gateway - Chat Export</h2>
                    <p style="font-size: 12px; color: #555;">Kontak: <b>${act.name}</b> | Tanggal Cetak: ${new Date().toLocaleDateString()}</p>
                    <hr style="border: 1px solid #ccc; margin-bottom: 20px;">
                    <div style="white-space: pre-wrap; font-size: 14px; line-height: 1.6;">${combinedText.replace(/_|-/g, '')}</div>
                `;
                
                const options = {
                    margin: 10,
                    filename: `Chat_Export_${act.name}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2 },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };
                html2pdf().from(exportArea).save();
            }
            clearSelection();
        }

        // FITUR BARU: Download File Gambar & Video Base64 ke Komputer Lokal
        function downloadMediaFile(base64Data, filename) {
            const link = document.createElement('a');
            link.href = base64Data;
            link.download = filename;
            link.click();
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey && !isInputExpanded) {
                e.preventDefault(); sendText();
            }
        }

        function sendText() {
            const inp = document.getElementById('msg-input'); if(!inp.value.trim()) return;
            const act = contacts.find(c => c.id === activeId); if (!act) return;
            const now = new Date();
            
            act.messages.push({ 
                id: Date.now(), type: 'out', msgType: 'text', text: inp.value, 
                time: now.getHours().toString().padStart(2, '0') + '.' + now.getMinutes().toString().padStart(2, '0') 
            });
            
            inp.value = '';
            if(!isInputExpanded) inp.style.height = '36px';
            renderMessages(); renderContacts(); save();
        }

        function handleFileUpload(input, type) {
            const file = input.files[0]; if (!file) return;
            const act = contacts.find(c => c.id === activeId); if (!act) return;
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + '.' + now.getMinutes().toString().padStart(2, '0');

            if (type === 'image' || type === 'video') {
                const reader = new FileReader();
                reader.onload = function(e) {
                    act.messages.push({ id: Date.now(), type: 'out', msgType: type, src: e.target.result, text: type === 'image' ? '📷 Photo' : '🎥 Video', time: timeStr });
                    renderMessages(); renderContacts(); save();
                };
                reader.readAsDataURL(file);
            } else {
                act.messages.push({ id: Date.now(), type: 'out', msgType: 'document', text: file.name, time: timeStr });
                renderMessages(); renderContacts(); save();
            }
            input.value = '';
        }

        function toggleSelect(id) {
            if(selectedIds.includes(id)) selectedIds = selectedIds.filter(i => i !== id);
            else selectedIds.push(id);
            const bar = document.getElementById('wa-toolbar');
            if(selectedIds.length > 0) {
                bar.classList.remove('hidden');
                document.getElementById('sel-count').innerText = selectedIds.length + " Sel";
            } else { bar.classList.add('hidden'); }
            renderMessages();
        }

        function clearSelection() { selectedIds = []; document.getElementById('wa-toolbar').classList.add('hidden'); renderMessages(); }

        function deleteMsg() {
            const act = contacts.find(c => c.id === activeId); if (!act) return;
            act.messages = act.messages.filter(m => !selectedIds.includes(m.id));
            clearSelection(); renderContacts(); save();
        }

        function openForwardModal() {
            document.getElementById('forward-modal').classList.remove('hidden');
            const list = document.getElementById('forward-list'); list.innerHTML = '';
            contacts.filter(c => c.id !== activeId).forEach(c => {
                list.insertAdjacentHTML('beforeend', `<button onclick="forwardTo('${c.id}')" class="w-full text-left p-2.5 rounded bg-[#2a3942] hover:bg-emerald-700 block transition text-sm">➡️ ${c.name}</button>`);
            });
        }

        function forwardTo(targetId) {
            const act = contacts.find(c => c.id === activeId);
            const target = contacts.find(c => c.id === targetId);
            const selectedMsgs = act.messages.filter(m => selectedIds.includes(m.id));
            selectedMsgs.forEach(m => { target.messages.push({ ...m, id: Date.now() + Math.random(), type: 'out' }); });
            closeModal('forward-modal'); clearSelection(); renderContacts(); save();
            alert(`Pesan berhasil diteruskan ke ${target.name}`);
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function closeMenus() { document.getElementById('attach-menu').classList.add('hidden'); }

        function saveContact() {
            const name = document.getElementById('new-name').value.trim(); if(!name) return;
            const id = 'id_' + Date.now();
            contacts.push({ id: id, name: name, color: 'bg-purple-600', isArchived: false, messages: [] });
            closeModal('contact-modal'); document.getElementById('new-name').value=''; switchChat(id);
        }

        if (window.innerWidth >= 768) { renderContacts(); renderMessages(); } 
        else { renderContacts(); document.getElementById('sidebar-panel').classList.remove('hidden'); document.getElementById('main-content-panel').classList.add('hidden'); }
    </script>
</body>
</html>
