<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Gateway Dashboard - Contact Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#1e262b', sidebarBg: '#131a1e', chatBg: '#0b141a',
                        textMuted: '#8696a0', activeGreen: '#00a884',
                        bubbleOut: '#005c4b', bubbleIn: '#202c33', settingsBg: '#222e35'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-darkBg text-white h-screen flex overflow-hidden font-sans select-none" onclick="closeMenus()">

    <div class="w-16 bg-sidebarBg flex flex-col justify-between items-center py-4 border-r border-gray-800">
        <div class="flex flex-col space-y-6 items-center w-full">
            <div onclick="toggleView('chat')" class="text-activeGreen bg-[#202c33] p-3 rounded-xl cursor-pointer"><i class="fa-regular fa-comment-dots text-xl"></i></div>
            <div onclick="toggleView('settings')" class="text-textMuted hover:text-white p-3 cursor-pointer"><i class="fa-solid fa-gear text-xl"></i></div>
        </div>
    </div>

    <div class="w-80 bg-sidebarBg flex flex-col border-r border-gray-800">
        <div id="sidebar-chat-view" class="flex flex-col h-full justify-between">
            <div class="flex flex-col flex-1 min-h-0">
                <div class="p-4 space-y-4">
                    <div class="flex justify-between items-center">
                        <h1 id="sidebar-title" class="text-xl font-semibold">Chats</h1>
                        <button onclick="openModal('contact-modal')" class="text-xs bg-activeGreen px-2.5 py-1.5 rounded hover:bg-emerald-600"><i class="fa-solid fa-plus"></i> Add Contact</button>
                    </div>
                    <input type="text" placeholder="Search" class="w-full bg-[#202c33] text-sm p-2 rounded-lg outline-none">
                </div>
                
                <div id="chat-list" class="flex-1 overflow-y-auto px-2 space-y-1"></div>
            </div>

            <div class="p-2 border-t border-gray-800 bg-sidebarBg z-10">
                <button id="btn-toggle-archive" onclick="toggleArchiveView()" class="w-full flex items-center justify-between p-3 rounded-lg bg-[#202c33] text-sm hover:bg-gray-800 transition">
                    <span class="flex items-center gap-2"><i class="fa-solid fa-box-archive text-activeGreen"></i> <span id="archive-btn-text">Lihat Arsip</span></span>
                    <span id="archive-count" class="bg-gray-700 px-2 py-0.5 rounded-full text-xs text-white">0</span>
                </button>
            </div>
        </div>

        <div id="sidebar-settings-view" class="hidden flex flex-col h-full p-4 space-y-2">
            <h1 class="text-xl font-semibold mb-4">Settings</h1>
            <button onclick="switchSettingsTab('general')" class="w-full text-left p-3 rounded bg-[#202c33] text-sm font-medium hover:bg-gray-800">📁 General Settings</button>
            <button onclick="switchSettingsTab('users')" class="w-full text-left p-3 rounded bg-[#202c33] text-sm font-medium hover:bg-gray-800">👥 Users Management</button>
            <button onclick="switchSettingsTab('api')" class="w-full text-left p-3 rounded bg-[#202c33] text-sm font-medium hover:bg-gray-800">🔑 API Integrations</button>
        </div>
    </div>

    <div class="flex-1 bg-chatBg flex flex-col justify-between relative">
        <div id="main-chat-panel" class="flex flex-col h-full justify-between">
            <div class="h-16 bg-[#202c33] flex items-center justify-between px-6 border-b border-gray-800 z-20">
                <div id="normal-header" class="flex items-center space-x-3">
                    <div id="active-avatar" class="w-10 h-10 bg-sky-600 rounded-full flex items-center justify-center font-bold">T</div>
                    <h3 id="active-name" class="text-sm font-medium">TFAM ID</h3>
                </div>
                
                <div id="wa-toolbar" class="hidden flex items-center space-x-4 bg-[#005c4b] px-4 py-1.5 rounded-lg text-sm">
                    <span id="sel-count">0 Selected</span>
                    <button onclick="openForwardModal()" class="hover:text-green-300"><i class="fa-solid fa-share"></i> Forward</button>
                    <button onclick="deleteMsg()" class="text-red-400 hover:text-red-300"><i class="fa-solid fa-trash"></i> Delete</button>
                    <button onclick="clearSelection()" class="text-gray-300">Cancel</button>
                </div>
            </div>

            <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-3 bg-opacity-95"></div>

            <div id="attach-menu" class="hidden absolute bottom-20 left-6 bg-[#222e35] rounded-xl border border-gray-700 py-2 w-48 z-40">
                <label class="flex items-center space-x-3 px-4 py-3 hover:bg-[#2a3942] cursor-pointer text-sm"><i class="fa-regular fa-image text-emerald-400"></i><span>Image / Photo</span><input type="file" accept="image/*" class="hidden" onchange="handleFileUpload(this, 'image')"></label>
                <label class="flex items-center space-x-3 px-4 py-3 hover:bg-[#2a3942] cursor-pointer text-sm"><i class="fa-regular fa-file-video text-red-400"></i><span>Video</span><input type="file" accept="video/*" class="hidden" onchange="handleFileUpload(this, 'video')"></label>
                <label class="flex items-center space-x-3 px-4 py-3 hover:bg-[#2a3942] cursor-pointer text-sm"><i class="fa-regular fa-file-lines text-blue-400"></i><span>Document</span><input type="file" accept=".pdf,.doc,.docx,.xls,.xlsx,.txt" class="hidden" onchange="handleFileUpload(this, 'document')"></label>
            </div>

            <div class="h-16 bg-[#202c33] flex items-center px-4 space-x-4 border-t border-gray-800 relative z-30">
                <button onclick="event.stopPropagation(); document.getElementById('attach-menu').classList.toggle('hidden')" class="text-textMuted hover:text-white text-xl"><i class="fa-solid fa-paperclip"></i></button>
                <input type="text" id="msg-input" placeholder="Type a message..." class="flex-1 bg-[#2a3942] py-2.5 px-4 rounded-lg outline-none text-sm" onkeypress="if(event.key==='Enter')sendText()">
                <button onclick="sendText()" class="text-activeGreen text-xl"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>

        <div id="main-settings-panel" class="hidden flex-1 p-8 overflow-y-auto bg-sidebarBg">
            <div id="tab-general" class="space-y-4">
                <h2 class="text-xl font-bold">General Settings</h2>
                <div class="bg-settingsBg p-4 rounded-lg max-w-md border border-gray-700">
                    <label class="text-xs text-textMuted block mb-1">Gateway Name</label>
                    <input type="text" value="WhatsApp Local Gateway" class="w-full bg-[#2a3942] p-2 rounded outline-none text-sm mb-3">
                    <button onclick="alert('Settings Saved')" class="bg-activeGreen px-4 py-2 rounded text-sm">Save Changes</button>
                </div>
            </div>
            <div id="tab-users" class="hidden space-y-4"><h2 class="text-xl font-bold">Users Management</h2><p class="text-sm text-textMuted">Admin Profile active.</p></div>
            <div id="tab-api" class="hidden space-y-4">
                <h2 class="text-xl font-bold">API Integrations</h2>
                <div class="bg-settingsBg p-4 rounded-lg max-w-md border border-gray-700">
                    <label class="text-xs text-textMuted block mb-1">Your API Key</label>
                    <input type="text" value="wg_live_98234jksdf9234kmcsdf" readonly class="w-full bg-black/40 text-emerald-400 p-2 rounded text-xs font-mono">
                </div>
            </div>
        </div>
    </div>

    <div id="contact-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-settingsBg p-6 rounded-xl w-full max-w-sm border border-gray-700">
            <h3 class="text-lg font-semibold mb-4">Add New Contact</h3>
            <input type="text" id="new-name" placeholder="Contact Name" class="w-full bg-[#2a3942] p-2.5 rounded mb-4 outline-none text-sm">
            <div class="flex justify-end space-x-2"><button onclick="closeModal('contact-modal')" class="text-textMuted text-sm">Cancel</button><button onclick="saveContact()" class="bg-activeGreen px-4 py-2 rounded text-sm">Save</button></div>
        </div>
    </div>

    <div id="forward-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-settingsBg p-6 rounded-xl w-full max-w-sm border border-gray-700">
            <h3 class="text-lg font-semibold mb-4">Forward Message To:</h3>
            <div id="forward-list" class="space-y-2 max-h-60 overflow-y-auto mb-4"></div>
            <div class="flex justify-end"><button onclick="closeModal('forward-modal')" class="text-sm text-textMuted">Cancel</button></div>
        </div>
    </div>

    <script>
        // Database lokal + Status Arsip (isArchived)
        let contacts = JSON.parse(localStorage.getItem('wg_chats')) || [
            { id: 'tfam', name: 'TFAM ID', color: 'bg-sky-600', isArchived: false, messages: [{ id: 1, type: 'in', msgType: 'text', text: 'Halo selamat pagi!', time: '09.00' }] }
        ];
        let activeId = localStorage.getItem('wg_active') || 'tfam';
        let selectedIds = [];
        let viewArchivedMode = false; // Menyimpan status tampilan sidebar sedang melihat arsip atau tidak

        function save() {
            localStorage.setItem('wg_chats', JSON.stringify(contacts));
            localStorage.setItem('wg_active', activeId);
        }

        function toggleView(view) {
            if (view === 'chat') {
                document.getElementById('sidebar-chat-view').classList.remove('hidden');
                document.getElementById('main-chat-panel').classList.remove('hidden');
                document.getElementById('sidebar-settings-view').classList.add('hidden');
                document.getElementById('main-settings-panel').classList.add('hidden');
            } else {
                document.getElementById('sidebar-chat-view').classList.add('hidden');
                document.getElementById('main-chat-panel').classList.add('hidden');
                document.getElementById('sidebar-settings-view').classList.remove('hidden');
                document.getElementById('main-settings-panel').classList.remove('hidden');
            }
        }

        function switchSettingsTab(tab) {
            ['general', 'users', 'api'].forEach(t => document.getElementById(`tab-${t}`).classList.add('hidden'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
        }

        // BERFUNGSI: Mengganti mode tampilan chat biasa vs arsip
        function toggleArchiveView() {
            viewArchivedMode = !viewArchivedMode;
            document.getElementById('sidebar-title').innerText = viewArchivedMode ? "Archived Chats" : "Chats";
            document.getElementById('archive-btn-text').innerText = viewArchivedMode ? "Lihat Chat Utama" : "Lihat Arsip";
            
            // Otomatis pindah ke chat pertama yang tersedia di view tersebut agar halaman tidak blank
            const filtered = contacts.filter(c => c.isArchived === viewArchivedMode);
            if (filtered.length > 0) activeId = filtered[0].id;
            
            renderContacts();
            renderMessages();
        }

        function renderContacts() {
            const list = document.getElementById('chat-list'); list.innerHTML = '';
            
            // Filter kontak berdasarkan view sekarang (Utama vs Arsip)
            const showContacts = contacts.filter(c => c.isArchived === viewArchivedMode);
            
            // Update hitungan total arsip di badge bawah
            const archiveCount = contacts.filter(c => c.isArchived).length;
            document.getElementById('archive-count').innerText = archiveCount;

            showContacts.forEach(c => {
                const last = c.messages[c.messages.length - 1] || { text: 'Belum ada pesan' };
                const isAct = c.id === activeId ? 'bg-[#202c33]' : '';
                const archiveIcon = c.isArchived ? 'fa-solid fa-box-open' : 'fa-solid fa-box-archive';
                const archiveTitle = c.isArchived ? 'Unarchive' : 'Archive';

                list.insertAdjacentHTML('beforeend', `
                    <div onclick="switchChat('${c.id}')" class="group flex items-center justify-between p-3 rounded-lg cursor-pointer ${isAct} hover:bg-[#202c33]/50 relative transition">
                        <div class="flex items-center space-x-3 min-w-0 flex-1">
                            <div class="w-10 h-10 ${c.color} rounded-full flex items-center justify-center font-bold shrink-0">${c.name[0]}</div>
                            <div class="flex-1 min-w-0">
                                <h2 class="text-sm truncate pr-16">${c.name}</h2>
                                <p class="text-xs text-textMuted truncate pr-16">${last.text}</p>
                            </div>
                        </div>
                        <div class="absolute right-3 top-1/2 -translate-y-1/2 hidden group-hover:flex items-center space-x-2 bg-gradient-to-l from-[#131a1e] via-[#131a1e] to-transparent pl-6 h-full z-10">
                            <button onclick="event.stopPropagation(); toggleArchiveContact('${c.id}')" class="text-textMuted hover:text-activeGreen p-1" title="${archiveTitle}">
                                <i class="${archiveIcon}"></i>
                            </button>
                            <button onclick="event.stopPropagation(); deleteContact('${c.id}')" class="text-textMuted hover:text-red-400 p-1" title="Delete Contact">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                    </div>
                `);
            });
        }

        // FITUR BARU: Arsipkan / Buka Arsip Kontak
        function toggleArchiveContact(id) {
            const contact = contacts.find(c => c.id === id);
            if (contact) {
                contact.isArchived = !contact.isArchived;
                
                // Cari kontak alternatif untuk dijadikan aktif setelah yang ini dipindah
                const remaining = contacts.filter(c => c.isArchived === viewArchivedMode);
                if (activeId === id) {
                    activeId = remaining.length > 0 ? remaining[0].id : null;
                }
                
                save();
                renderContacts();
                renderMessages();
            }
        }

        // FITUR BARU: Hapus Kontak secara Permanen beserta isi chatnya
        function deleteContact(id) {
            if (confirm("Apakah Anda yakin ingin menghapus kontak ini beserta seluruh riwayat pesannya secara permanen?")) {
                contacts = contacts.filter(c => c.id !== id);
                
                if (activeId === id) {
                    const remaining = contacts.filter(c => c.isArchived === viewArchivedMode);
                    activeId = remaining.length > 0 ? remaining[0].id : null;
                }
                
                save();
                renderContacts();
                renderMessages();
            }
        }

        function renderMessages() {
            const box = document.getElementById('chat-messages'); box.innerHTML = '';
            const act = contacts.find(c => c.id === activeId); 
            
            if (!act) {
                box.innerHTML = '<div class="h-full flex items-center justify-center text-textMuted text-sm">Pilih kontak atau tambah kontak untuk memulai obrolan</div>';
                document.getElementById('active-name').innerText = "-";
                document.getElementById('active-avatar').innerText = "?";
                return;
            }

            document.getElementById('active-name').innerText = act.name;
            document.getElementById('active-avatar').innerText = act.name[0];

            act.messages.forEach(m => {
                const isOut = m.type === 'out';
                const isSel = selectedIds.includes(m.id);
                const bg = isOut ? 'bg-bubbleOut' : 'bg-bubbleIn';
                const side = isOut ? 'justify-end' : 'justify-start';
                const border = isSel ? 'border-2 border-emerald-400 scale-[0.98]' : '';

                let contentHTML = `<p class="text-sm font-light pr-10">${m.text}</p>`;
                if (m.msgType === 'image') contentHTML = `<img src="${m.src}" class="max-w-xs rounded mb-1 max-h-48 object-cover">`;
                if (m.msgType === 'video') contentHTML = `<video src="${m.src}" controls class="max-w-xs rounded mb-1 max-h-48"></video>`;
                if (m.msgType === 'document') contentHTML = `<div class="flex items-center space-x-2 p-1 bg-black/20 rounded text-sm"><i class="fa-regular fa-file-pdf text-xl text-red-400"></i><span class="truncate max-w-[180px]">${m.text}</span></div>`;

                box.insertAdjacentHTML('beforeend', `
                    <div oncontextmenu="event.preventDefault(); toggleSelect(${m.id})" onclick="if(selectedIds.length>0) toggleSelect(${m.id})" class="flex ${side} cursor-pointer transition-all duration-100">
                        <div class="${bg} ${border} max-w-md rounded-lg p-2.5 shadow relative">
                            ${isSel ? '<span class="text-[10px] text-emerald-400 block font-bold mb-1"><i class="fa-solid fa-circle-check"></i> Selected</span>' : ''}
                            ${contentHTML}
                            <span class="text-[9px] text-textMuted absolute bottom-1 right-2">${m.time}</span>
                        </div>
                    </div>
                `);
            });
            box.scrollTop = box.scrollHeight;
        }

        function switchChat(id) { activeId = id; clearSelection(); renderContacts(); renderMessages(); save(); }

        function sendText() {
            const inp = document.getElementById('msg-input'); if(!inp.value.trim()) return;
            const act = contacts.find(c => c.id === activeId); if (!act) return;
            const now = new Date();
            act.messages.push({ id: Date.now(), type: 'out', msgType: 'text', text: inp.value, time: now.getHours().toString().padStart(2, '0')+'.'+now.getMinutes().toString().padStart(2, '0') });
            inp.value = ''; renderMessages(); renderContacts(); save();
        }

        function handleFileUpload(input, type) {
            const file = input.files[0]; if (!file) return;
            const act = contacts.find(c => c.id === activeId); if (!act) return;
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0')+'.'+now.getMinutes().toString().padStart(2, '0');

            if (type === 'image' || type === 'video') {
                const reader = new FileReader();
                reader.onload = function(e) {
                    act.messages.push({ id: Date.now(), type: 'out', msgType: type, src: e.target.result, text: type === 'image' ? '📷 Photo' : '🎥 Video', time: timeStr });
                    renderMessages(); renderContacts(); save();
                };
                reader.readAsDataURL(file);
            } else {
                act.messages.push({ id: Date.now(), type: 'out', msgType: 'document', text: file.name, time: timeStr });
                renderMessages(); renderContacts(); save();
            }
            input.value = '';
        }

        function toggleSelect(id) {
            if(selectedIds.includes(id)) selectedIds = selectedIds.filter(i => i !== id);
            else selectedIds.push(id);
            const bar = document.getElementById('wa-toolbar');
            if(selectedIds.length > 0) {
                bar.classList.remove('hidden');
                document.getElementById('sel-count').innerText = selectedIds.length + " Selected";
            } else { bar.classList.add('hidden'); }
            renderMessages();
        }

        function clearSelection() { selectedIds = []; document.getElementById('wa-toolbar').classList.add('hidden'); renderMessages(); }

        function deleteMsg() {
            const act = contacts.find(c => c.id === activeId); if (!act) return;
            act.messages = act.messages.filter(m => !selectedIds.includes(m.id));
            clearSelection(); renderContacts(); save();
        }

        function openForwardModal() {
            document.getElementById('forward-modal').classList.remove('hidden');
            const list = document.getElementById('forward-list'); list.innerHTML = '';
            contacts.filter(c => c.id !== activeId).forEach(c => {
                list.insertAdjacentHTML('beforeend', `<button onclick="forwardTo('${c.id}')" class="w-full text-left p-2.5 rounded bg-[#2a3942] hover:bg-emerald-700 block transition text-sm">➡️ ${c.name}</button>`);
            });
        }

        function forwardTo(targetId) {
            const act = contacts.find(c => c.id === activeId);
            const target = contacts.find(c => c.id === targetId);
            const selectedMsgs = act.messages.filter(m => selectedIds.includes(m.id));
            
            selectedMsgs.forEach(m => {
                target.messages.push({ ...m, id: Date.now() + Math.random(), type: 'out' });
            });
            closeModal('forward-modal'); clearSelection(); renderContacts(); save();
            alert(`Pesan berhasil diteruskan ke ${target.name}`);
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function closeMenus() { document.getElementById('attach-menu').classList.add('hidden'); }

        function saveContact() {
            const name = document.getElementById('new-name').value.trim(); if(!name) return;
            const id = 'id_' + Date.now();
            contacts.push({ id: id, name: name, color: 'bg-purple-600', isArchived: false, messages: [] });
            closeModal('contact-modal'); document.getElementById('new-name').value=''; switchChat(id);
        }

        renderContacts();
        renderMessages();
    </script>
</body>
</html>
